<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glow.ai — Create account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#09090b;--bg2:#111113;--bg3:#18181b;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#fafafa;--text2:#a1a1aa;--text3:#52525b;--glow:#6ee7b7;--glow3:#10b981;--danger:#f87171;--sans:'Inter',system-ui,sans-serif;--display:'Syne',sans-serif}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px}
    .brand{font-family:var(--display);font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.25rem}
    .brand span{color:var(--glow)}
    .subtitle{font-size:13px;color:var(--text3);margin-bottom:2rem}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
    label{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3)}
    input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 14px;border-radius:8px;outline:none;width:100%;transition:border-color .15s}
    input:focus{border-color:rgba(110,231,183,0.4)}
    .btn{background:var(--glow3);color:#022c22;border:none;font-family:var(--sans);font-size:14px;font-weight:500;padding:12px;border-radius:8px;cursor:pointer;width:100%;margin-top:0.5rem;transition:all .15s}
    .btn:hover{background:#34d399}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .error{color:var(--danger);font-size:12px;margin-top:0.5rem;display:none}
    .switch{text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text3)}
    .switch a{color:var(--glow);text-decoration:none}
    .switch a:hover{text-decoration:underline}
    .divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Glow<span>.ai</span></div>
  <p class="subtitle">Create your research account</p>

  <form id="signupForm">
    <div class="field">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Enter your name" required/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required minlength="8"/>
    </div>
    <p class="error" id="errorMsg"></p>
    <button class="btn" type="submit" id="submitBtn">Create account</button>
  </form>

  <hr class="divider"/>
  <p class="switch">Already have an account? <a href="/login">Sign in</a></p>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  btn.disabled = true; btn.textContent = 'Creating account…'; err.style.display = 'none';

  try {
    const res  = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });

    const data = await res.json();

    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.detail || 'Sign up failed';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create account';
    }
  } catch (err_obj) {
    console.error(err_obj);
    err.textContent = 'Connection error. Please check your internet or server logs.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
