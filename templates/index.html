<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glow.ai — Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- Mobile top bar -->
<header class="mobile-topbar">
  <div class="mobile-brand">Glow<span>.ai</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="status-dot" id="mobileStatusDot"></span>
    <button class="hamburger" onclick="openDrawer()">☰</button>
  </div>
</header>

<!-- Mobile drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div class="sidebar-top">
    <div class="brand"><span class="brand-logo">Glow</span><span class="brand-dot">.ai</span></div>
    <div class="brand-sub">Research Agent v2</div>
  </div>
  <nav class="nav">
    <button class="nav-item active" data-mode="summarize"><span class="nav-icon">◈</span><span>Summarize</span></button>
    <button class="nav-item" data-mode="outline"><span class="nav-icon">◧</span><span>Outline</span></button>
    <button class="nav-item" data-mode="draft"><span class="nav-icon">◫</span><span>Draft</span></button>
    <button class="nav-item" data-mode="sources"><span class="nav-icon">◉</span><span>Sources</span></button>
    <button class="nav-item" data-mode="analyze"><span class="nav-icon">◎</span><span>Analyze Docs</span></button>
  </nav>
  <div class="sidebar-bottom">
    <div class="agent-status">
      <span class="status-dot" id="drawerStatusDot"></span>
      <span class="status-label" id="drawerStatusText">Connecting…</span>
    </div>
    <a href="/docs" target="_blank" class="docs-link">API docs ↗</a>
  </div>
</div>

<!-- Main app -->
<div class="app">

  <!-- Desktop sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand"><span class="brand-logo">Glow</span><span class="brand-dot">.ai</span></div>
      <div class="brand-sub">Research Agent v2</div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-mode="summarize"><span class="nav-icon">◈</span><span>Summarize</span></button>
      <button class="nav-item" data-mode="outline"><span class="nav-icon">◧</span><span>Outline</span></button>
      <button class="nav-item" data-mode="draft"><span class="nav-icon">◫</span><span>Draft</span></button>
      <button class="nav-item" data-mode="sources"><span class="nav-icon">◉</span><span>Sources</span></button>
      <button class="nav-item" data-mode="analyze"><span class="nav-icon">◎</span><span>Analyze Docs</span></button>
    </nav>
    <div class="sidebar-bottom">
      <div class="agent-status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusText">Connecting…</span>
      </div>
      <a href="/docs" target="_blank" class="docs-link">API docs ↗</a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- Header -->
    <div class="main-header">
      <div>
        <h1 class="main-title" id="modeTitle">Summarize a topic</h1>
        <p class="main-sub" id="modeSub">Get a clear, structured overview of any research topic.</p>
      </div>
      <div class="header-actions" id="headerActions" style="opacity:0;pointer-events:none;">
        <button class="pill-btn" onclick="copyOutput()">Copy</button>
        <button class="pill-btn" onclick="downloadMarkdown()">Download .md</button>
        <button class="pill-btn pill-accent" onclick="downloadPDF()">Export PDF</button>
        <button class="pill-btn pill-ghost" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <!-- Output / chat area -->
    <div class="output-area" id="outputArea">

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-orb"></div>
        <p class="empty-title">What are you researching?</p>
        <p class="empty-sub">Type a topic or tap + to upload a file.</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="fillSuggestion('The role of AI in modern healthcare')">AI in healthcare</button>
          <button class="chip" onclick="fillSuggestion('Climate change and food security in Africa')">Climate &amp; food security</button>
          <button class="chip" onclick="fillSuggestion('Quantum computing fundamentals')">Quantum computing</button>
          <button class="chip" onclick="fillSuggestion('The psychology of social media addiction')">Social media psychology</button>
          <button class="chip" onclick="fillSuggestion('Renewable energy transition challenges')">Renewable energy</button>
          <button class="chip" onclick="fillSuggestion('CRISPR gene editing ethics and applications')">CRISPR ethics</button>
        </div>
      </div>

      <!-- Loading -->
      <div class="loading-state" id="loadingState" style="display:none;">
        <div class="glow-loader">
          <div class="glow-ring"></div><div class="glow-ring r2"></div><div class="glow-ring r3"></div>
        </div>
        <p class="loading-label" id="loadingLabel">Researching…</p>
      </div>

      <!-- Error -->
      <div class="error-state" id="errorState" style="display:none;"></div>

      <!-- Chat thread -->
      <div class="result-area" id="resultArea" style="display:none;">
        <div class="result-meta">
          <span class="result-badge" id="resultBadge">Summary</span>
          <span class="result-stats" id="resultStats"></span>
          <span class="doc-badge" id="docBadge" style="display:none;"></span>
        </div>
        <div class="chat-thread" id="chatThread"></div>
      </div>

    </div>

    <!-- ── WhatsApp-style input bar ── -->
    <div class="wa-bar">

      <!-- File chips (shown above bar when files attached) -->
      <div class="file-chips" id="fileChips"></div>

      <!-- Hidden file inputs -->
      <input type="file" id="fileInputDoc"   multiple accept=".pdf,.txt,.md,.docx"      style="display:none;" onchange="onFileSelect(event)"/>
      <input type="file" id="fileInputImage" multiple accept=".jpg,.jpeg,.png,.webp"    style="display:none;" onchange="onFileSelect(event)"/>

      <!-- Upload popup menu -->
      <div class="upload-popup" id="uploadPopup">
        <button class="upload-option" onclick="chooseUpload('doc')">
          <span class="upload-option-icon">📄</span>
          <span>Document</span>
          <span class="upload-option-sub">PDF, TXT, DOCX</span>
        </button>
        <button class="upload-option" onclick="chooseUpload('image')">
          <span class="upload-option-icon">🖼️</span>
          <span>Image</span>
          <span class="upload-option-sub">JPG, PNG, WEBP</span>
        </button>
      </div>

      <div class="wa-inner">
        <!-- + button -->
        <button class="wa-plus" id="plusBtn" onclick="toggleUploadPopup()" title="Attach file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>

        <!-- Text input -->
        <textarea
          id="topicInput"
          class="wa-input"
          placeholder="Type a research topic…"
          rows="1"
        ></textarea>

        <!-- Send button -->
        <button class="wa-send" id="sendBtn" onclick="handleSend()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>

    </div>

  </main>
</div>

<!-- Mobile bottom tab bar -->
<nav class="mobile-modebar">
  <button class="mobile-tab active" data-mode="summarize"><span class="tab-icon">◈</span>Summarize</button>
  <button class="mobile-tab" data-mode="outline"><span class="tab-icon">◧</span>Outline</button>
  <button class="mobile-tab" data-mode="draft"><span class="tab-icon">◫</span>Draft</button>
  <button class="mobile-tab" data-mode="sources"><span class="tab-icon">◉</span>Sources</button>
  <button class="mobile-tab" data-mode="analyze"><span class="tab-icon">◎</span>Analyze</button>
</nav>

<script src="/static/js/app.js"></script>
</body>
</html>
